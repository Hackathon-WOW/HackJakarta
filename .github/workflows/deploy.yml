name: Deploy

# Build images in CI -> push to GHCR -> droplet pulls (no building on the droplet).
# Routing is handled on the droplet by Traefik / Cloudflare Tunnel -> grow-prod-caddy-1:80,
# so this stack binds no public ports and never touches 80/443.
#
# Required repo secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH
# The droplet must already have DEPLOY_PATH/.env in place (managed manually, not by CI).
# GHCR auth uses the built-in GITHUB_TOKEN.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/grow-backend:latest
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/grow-frontend:latest

  deploy:
    name: Deploy on droplet (pull only)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare droplet (dir + keep routing wired)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}/deploy"
            # keep the edge proxy + tunnel able to reach grow (idempotent)
            docker network connect grow-prod_default goodcafes-edge-1 2>/dev/null || true
            docker network connect grow-prod_default qrypto-cloudflared-1 2>/dev/null || true
            if [ ! -f "${{ secrets.DEPLOY_PATH }}/.env" ]; then
              echo "::error::Missing ${{ secrets.DEPLOY_PATH }}/.env on the droplet — create it once (see .env.production.example)"; exit 1
            fi

      - name: Copy compose + Caddyfile to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy/Caddyfile"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm migrate
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
