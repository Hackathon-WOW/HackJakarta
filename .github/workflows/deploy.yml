name: Deploy

# Deploys to the DigitalOcean Droplet over SSH on every push to main (or manually).
# Required repo secrets:
#   DEPLOY_HOST      Droplet IP or hostname
#   DEPLOY_USER      SSH user (e.g. root)
#   DEPLOY_SSH_KEY   base64 of the private key  ->  base64 -w0 ~/.ssh/grow_deploy
#   DEPLOY_PATH      (optional) app dir on the Droplet, defaults to ~/grow

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "Key fingerprint:"; ssh-keygen -lf ~/.ssh/id_ed25519 || (echo "::error::DEPLOY_SSH_KEY is not valid base64 of a private key"; exit 1)

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          REMOTE_PATH="${DEPLOY_PATH:-~/grow}"
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "cd ${REMOTE_PATH} && git pull --ff-only && docker compose -f docker-compose.prod.yml up -d --build && docker image prune -f"
