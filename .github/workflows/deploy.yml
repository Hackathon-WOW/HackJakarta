name: Deploy

# Deploys to the DigitalOcean Droplet over SSH on every push to main (or manually).
# Required repo secrets:
#   DEPLOY_HOST      Droplet IP or hostname
#   DEPLOY_USER      SSH user (e.g. root or a deploy user)
#   DEPLOY_SSH_KEY   private SSH key authorized on the Droplet
#   DEPLOY_PATH      (optional) app dir on the Droplet, defaults to ~/grow

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME/grow}"
            git pull --ff-only
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
