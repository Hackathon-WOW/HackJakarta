name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_TELEMETRY_DISABLED: "1"

  backend:
    name: Backend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate --schema=shared/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Transpile-check all entrypoints
        run: |
          set -e
          for entry in gateway/src/index.ts services/*/src/index.ts shared/seed.ts; do
            echo "checking $entry"
            bun build "$entry" --target bun --external '*' --outfile /tmp/check.js >/dev/null
          done

  compose:
    name: Validate compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dev + prod compose
        run: |
          docker compose -f docker-compose.yml config -q
          DOMAIN=:80 PUBLIC_URL=http://localhost JWT_SECRET=ci-placeholder \
            docker compose -f docker-compose.prod.yml config -q
